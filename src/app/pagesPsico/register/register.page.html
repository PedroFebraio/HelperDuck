<ion-header>
  <ion-toolbar>

    <ion-buttons slot="end">
      <ion-button
        fill="solid"
        color="warning"
        routerLink="/home">
        Voltar
      </ion-button>
    </ion-buttons>

    <ion-title color="warning">The Helper Duck 🦆</ion-title>

  </ion-toolbar>
</ion-header>

<ion-content class="cadastro-content">
  <div class="cadastro-container">

    <!-- HEADER -->
    <div class="header-text">
      <div class="logo">
        🧠
      </div>

      <h2>
        Cadastro Psicólogo
      </h2>

      <p>
        Faça parte da nossa rede de apoio emocional
      </p>
    </div>

    <form (ngSubmit)="cadastrar()">


      <!-- NOME -->
      <ion-item class="input-item">
        <ion-label position="stacked">Nome Completo</ion-label>

        <ion-input
          type="text"
          [(ngModel)]="nome"
          name="nome"
          required>

        </ion-input>
      </ion-item>


      <!-- EMAIL -->
      <ion-item class="input-item">
        <ion-label position="stacked">E-mail</ion-label>

        <ion-input
          type="email"
          [(ngModel)]="email"
          name="email"
          required>

        </ion-input>
      </ion-item>


      <!-- SENHA -->
      <ion-item class="input-item">
        <ion-label position="stacked">Senha</ion-label>

        <ion-input
          type="password"
          [(ngModel)]="senha"
          name="senha"
          minlength="6"
          required>

        </ion-input>
      </ion-item>


      <!-- CRP -->
      <ion-item class="input-item">
        <ion-label position="stacked">CRP</ion-label>

        <ion-input
          type="text"
          placeholder="Ex: 06/123456"
          [(ngModel)]="crp"
          name="crp"
          required>

        </ion-input>
      </ion-item>


      <!-- ESTADO -->
      <ion-item class="input-item">
        <ion-label position="stacked">Estado do CRP</ion-label>

        <ion-input
          type="text"
          placeholder="Ex: SP"
          [(ngModel)]="estadoCrp"
          name="estadoCrp"
          required>

        </ion-input>
      </ion-item>


      <!-- ESPECIALIDADES -->
      <ion-item class="input-item">

        <ion-label position="stacked">Especialidades</ion-label>

        <ion-select
        multiple="true"
        interface="popover"
        placeholder="Selecione as especialidades"
        [(ngModel)]="especialidades"
        name="especialidades">
          <ion-select-option
          *ngFor="let especialidade of especialidadesDisponiveis"
          [value]="especialidade">
            {{ especialidade }}

          </ion-select-option>
        </ion-select>
      </ion-item>


      <!-- DESCRIÇÃO -->
      <ion-item class="input-item">
        <ion-label position="stacked">Descrição Profissional</ion-label>

        <ion-textarea
          rows="4"
          autoGrow="true"
          [(ngModel)]="descricao"
          name="descricao"
          required>

        </ion-textarea>
      </ion-item>

      <!-- BOTÃO -->
      <ion-button
        expand="block"
        color="primary"
        class="submit-btn"
        type="submit"

        [disabled]="
          !nome || !email || !senha ||
          senha.length < 6 || !crp || crp.length > 8 ||
          crp.length < 5|| !estadoCrp ||
          especialidades.length === 0 ||
          !descricao">
        Solicitar Cadastro

      </ion-button>
    </form>

    <!-- LINKS -->
    <div class="links">
      <p>
        Já possui cadastro?
        <a routerLink="/loginPsico">
          Entrar
        </a>
      </p>
    </div>
  </div>

</ion-content>
